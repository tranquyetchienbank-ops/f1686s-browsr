<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1686s Cloud Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        
        #browser-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }
        
        #page-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f5a623;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: #333;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="browser-container">
        <!-- Sử dụng iframe để hiển thị trang -->
        <iframe id="page-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Đang tải...</div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const iframe = document.getElementById('page-frame');
            const loading = document.getElementById('loading');
            const TARGET_URL = 'https://f1686s.com';
            
            // Đọc Tampermonkey script từ server
            async function loadTampermonkeyScript() {
                try {
                    const response = await fetch('/tampermonkey-script.js?' + Date.now());
                    const scriptText = await response.text();
                    return scriptText;
                } catch (error) {
                    console.error('Failed to load Tampermonkey script:', error);
                    return null;
                }
            }
            
            // Inject script vào iframe
            function injectScriptToIframe(scriptText) {
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    if (!iframeDoc) {
                        console.log('Cannot access iframe document');
                        return false;
                    }
                    
                    // Tạo script element
                    const script = iframeDoc.createElement('script');
                    script.textContent = scriptText;
                    script.setAttribute('data-tampermonkey', 'true');
                    
                    // Thêm vào head
                    if (iframeDoc.head) {
                        iframeDoc.head.appendChild(script);
                        console.log('✅ Tampermonkey script injected successfully');
                        return true;
                    } else {
                        console.log('No head element in iframe');
                        return false;
                    }
                } catch (error) {
                    console.error('Error injecting script:', error);
                    return false;
                }
            }
            
            // Hàm chính để khởi tạo
            async function initBrowser() {
                // Load script
                const scriptText = await loadTampermonkeyScript();
                if (!scriptText) {
                    console.error('Cannot load Tampermonkey script');
                }
                
                // Load trang web
                iframe.src = TARGET_URL;
                
                // Khi iframe load xong
                iframe.addEventListener('load', function() {
                    console.log('Page loaded');
                    
                    // Ẩn loading
                    loading.classList.add('hidden');
                    
                    // Inject script sau khi load
                    if (scriptText) {
                        // Thử inject nhiều lần
                        setTimeout(() => {
                            injectScriptToIframe(scriptText);
                        }, 500);
                        
                        setTimeout(() => {
                            injectScriptToIframe(scriptText);
                        }, 1500);
                        
                        setTimeout(() => {
                            injectScriptToIframe(scriptText);
                        }, 3000);
                    }
                });
                
                // Timeout để ẩn loading
                setTimeout(() => {
                    loading.classList.add('hidden');
                }, 8000);
            }
            
            // Khởi tạo
            if (document.readyState === 'complete') {
                initBrowser();
            } else {
                window.addEventListener('load', initBrowser);
            }
            
            console.log('🚀 Cloud Browser initialized');
        })();
    </script>
</body>
</html>
