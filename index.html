<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1686s Cloud Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        #container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            position: relative;
        }
        
        #content {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f5a623;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: #333;
            font-size: 16px;
        }
        
        .loading-sub {
            margin-top: 8px;
            color: #888;
            font-size: 13px;
        }
        
        /* Ẩn scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="content"></div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Đang tải trình duyệt...</div>
        <div class="loading-sub">Đang khởi tạo Tampermonkey script</div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const content = document.getElementById('content');
            const loading = document.getElementById('loading');
            const PROXY_URL = '/load';
            
            console.log('🚀 Cloud Browser starting...');
            
            // Tải trang qua proxy
            async function loadPage() {
                try {
                    console.log('🔄 Fetching page via proxy...');
                    const response = await fetch(PROXY_URL);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const html = await response.text();
                    console.log('✅ Page loaded, length:', html.length);
                    
                    // Hiển thị HTML
                    content.innerHTML = html;
                    
                    // Ẩn loading
                    loading.classList.add('hidden');
                    
                    // Kiểm tra script đã chạy chưa
                    setTimeout(() => {
                        const iframe = document.querySelector('iframe');
                        if (iframe) {
                            console.log('📄 Iframe detected');
                            try {
                                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                                if (iframeDoc) {
                                    console.log('✅ Can access iframe document');
                                }
                            } catch (e) {
                                console.log('⚠️ Cannot access iframe (cross-origin)');
                            }
                        }
                    }, 2000);
                    
                } catch (error) {
                    console.error('❌ Failed to load page:', error);
                    content.innerHTML = `
                        <div style="padding:50px;text-align:center;font-family:sans-serif;">
                            <h2>⚠️ Không thể tải trang</h2>
                            <p style="color:#666;">${error.message}</p>
                            <button onclick="location.reload()" style="margin-top:20px;padding:10px 30px;background:#f5a623;border:none;border-radius:5px;color:#fff;font-size:16px;cursor:pointer;">
                                Thử lại
                            </button>
                        </div>
                    `;
                    loading.classList.add('hidden');
                }
            }
            
            // Khởi tạo
            if (document.readyState === 'complete') {
                loadPage();
            } else {
                window.addEventListener('load', loadPage);
            }
            
            // Fix cho Safari
            window.addEventListener('resize', function() {
                const container = document.getElementById('container');
                container.style.height = window.innerHeight + 'px';
            });
            
            console.log('✅ Cloud Browser initialized');
        })();
    </script>
</body>
</html>
